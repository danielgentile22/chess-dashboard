services:
  dashboard:
    build: .
    ports:
      - "8050:8050"
    environment:
      - LICHESS_STUDY_IDS=6jYtXHGp
      - PLAYER_NAME=
      - USCF_MEMBER_ID=32487228
      - WEB_CONCURRENCY=1
      - LOG_LEVEL=info
      - DEBUG=false
    restart: unless-stopped
    healthcheck:
      # curl isn't in python:slim
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8050/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
