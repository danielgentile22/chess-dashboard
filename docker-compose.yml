services:
  dashboard:
    build: .
    ports:
      - "8050:8050"
    environment:
      - LICHESS_STUDY_IDS=abcdWXYZ
      - DEMO_MODE=${DEMO_MODE:-}
      - PLAYER_NAME=
      - USCF_MEMBER_ID=12345678
      - LOG_LEVEL=info
      - DEBUG=false
    restart: unless-stopped
    healthcheck:
      # curl isn't in python:slim
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8050/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
