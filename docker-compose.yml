services:
  dashboard:
    build: .
    ports:
      - "8050:8050"
    environment:
      - LICHESS_STUDY_IDS=abcdWXYZ
      - PLAYER_NAME=
      - DEBUG=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      interval: 30s
      timeout: 5s
      retries: 3
