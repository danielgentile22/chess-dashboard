name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff
        run: ruff check .

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest with coverage (gate in pyproject.toml)
        run: pytest tests/ --cov --cov-report=term-missing --cov-fail-under=92

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run mypy (file list in pyproject.toml)
        run: mypy

  docker:
    name: Docker image (build + smoke)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t chess-dashboard .

      - name: Boot in demo mode and check /health
        run: |
          docker run -d --name cd -e DEMO_MODE=1 -p 8050:8050 chess-dashboard
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8050/health; then echo "healthy"; exit 0; fi
            sleep 2
          done
          echo "health check never passed"; docker logs cd; exit 1
