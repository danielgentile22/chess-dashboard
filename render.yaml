services:
  - type: web
    name: chess-stats-dashboard
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    # gunicorn targets the module-level Flask WSGI object in app.py
    startCommand: gunicorn app:server --config gunicorn.conf.py
    envVars:
      # Comma-separated Lichess Study IDs forming your game archive (ADR 0001).
      # Add the next Study's ID here when the current one hits the
      # 64-chapter limit, e.g. "abcdWXYZ,abcd1234".
      - key: LICHESS_STUDY_IDS
        value: "abcdWXYZ"
      # Optional Lichess API token — only needed for private studies.
      - key: LICHESS_API_TOKEN
        value: ""
      # Your name exactly as it appears in the Game White/Black headers.
      # Leave empty to auto-detect (most frequent name across all games).
      - key: PLAYER_NAME
        value: ""
      # USCF member ID whose record enriches the Games (ADR 0003).
      # Leave empty to run Lichess-only.
      - key: USCF_MEMBER_ID
        value: "12345678"
      # Gunicorn worker count — must be 1: Synced games live in worker
      # memory and the Sync button swaps them in-place (one per-user registry
      # per worker — PRD #55 / ADR 0005).
      - key: WEB_CONCURRENCY
        value: "1"
      # Set to "debug" for verbose gunicorn logs.
      - key: LOG_LEVEL
        value: "info"
      # --- Multi-user access & coach review (PRD #55) ----------------------
      # Leave USCF_DASHBOARD_USERS empty to run single-user and ungated, using
      # the LICHESS_STUDY_IDS / USCF_MEMBER_ID above (exactly as before).
      #
      # To go multi-user, set it to a JSON array of user records — one per
      # allowed user — and the whole dashboard goes behind a login. Each record:
      #   username, password_hash (mint with `python -m user_config hash '<pw>'`),
      #   study_ids, coach_study_ids, uscf_member_id, lichess_token.
      # Then USCF_DASHBOARD_USERS is the source of truth; the single-user vars
      # above are ignored. Set this in the Render dashboard (it holds secrets),
      # not in this committed file.
      - key: USCF_DASHBOARD_USERS
        value: ""
      # Signs the login session cookie. MUST be a stable secret in any
      # multi-user deployment (set it in the Render dashboard, not here).
      - key: SECRET_KEY
        value: ""
      # Where each user's disposable caches live (one subdir per user). The
      # Render free tier has no persistent disk, so these are best-effort and
      # rebuilt on each Sync (ADR 0001/0003/0005).
      - key: DATA_DIR
        value: ".user-data"
